<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cayena — Path Tracer (Experimental)</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
  #app { width: 100vw; height: 100vh; }
  #loading {
    position: fixed; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    background: #0a0a0f; color: #fff; z-index: 500;
    font: 15px -apple-system;
  }
  #loading h2 { font-size: 22px; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 12px; }
  #loading p { color: rgba(255,255,255,0.5); font-size: 13px; }
  #scene-select {
    position: fixed; top: 16px; left: 50%; transform: translateX(-50%);
    display: flex; gap: 8px; z-index: 100;
  }
  .scene-btn {
    background: rgba(0,0,0,0.6); color: #fff;
    border: 1px solid rgba(255,255,255,0.2);
    padding: 7px 16px; border-radius: 18px;
    font-size: 13px; cursor: pointer; backdrop-filter: blur(10px);
  }
  .scene-btn:hover { background: rgba(74,158,255,0.5); border-color: rgba(74,158,255,0.8); }
  #hint {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.5); color: rgba(255,255,255,0.6);
    padding: 6px 18px; border-radius: 18px; font-size: 12px;
    backdrop-filter: blur(10px); pointer-events: none;
  }
</style>
</head>
<body>
<div id="loading">
  <h2>Cayena Path Tracer</h2>
  <p>Building scene…</p>
</div>
<div id="app"></div>
<div id="scene-select">
  <button class="scene-btn" onclick="loadScene('cayena-depa1')">Unidad 1</button>
  <button class="scene-btn" onclick="loadScene('cayena-loft2')">Loft 2</button>
</div>
<div id="hint">Drag to orbit · Scroll to zoom</div>

<script type="module">
  import { startPathTracer } from '/src/pathTracer.js';

  const params = new URLSearchParams(location.search);
  const sceneId = params.get('scene') || 'cayena-depa1';

  document.getElementById('loading').querySelector('p').textContent =
    `Loading ${sceneId}…`;

  startPathTracer(document.getElementById('app'), sceneId)
    .then(() => {
      document.getElementById('loading').style.display = 'none';
    })
    .catch(err => {
      document.getElementById('loading').querySelector('p').textContent =
        'Error: ' + err.message;
      console.error(err);
    });

  window.loadScene = (id) => {
    location.search = `?scene=${id}`;
  };
</script>
</body>
</html>
